# CamCCUL Core Banking System - Docker Compose
# Production-ready configuration for local Cameroon deployment

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: camccul-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: camccul
      POSTGRES_PASSWORD: camccul_secure_password
      POSTGRES_DB: camccul_banking
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U camccul -d camccul_banking" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - camccul-network

  # Backend API
  backend:
    build: ./backend
    container_name: camccul-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://camccul:camccul_secure_password@db:5432/camccul_banking
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: "true"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - backend_static:/app/app/static
      - uploads_data:/app/uploads
      - reports_data:/app/reports
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - camccul-network

  # Frontend (React) - Development Mode with Hot Reload
  frontend:
    image: node:18-alpine
    container_name: camccul-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3002:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: /api/v1
    networks:
      - camccul-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: camccul-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - camccul-network

volumes:
  postgres_data:
  uploads_data:
  reports_data:
  redis_data:
  backend_static:


networks:
  camccul-network:
    driver: bridge
